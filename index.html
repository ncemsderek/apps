<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NCEMS Apps">
<meta name="theme-color" content="#1C3A1C">
<title>NCEMS Apps</title>
<style>
  :root{
    --g-deep:#1C3A1C;
    --g-mid:#2E6B2E;
    --g-accent:#3A8A3A;
    --g-pale:#EBF5EB;
    --warn:#B87E0A;
    --bad:#C13E3E;
    --ink:#13260F;
    --card:#ffffff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,var(--g-deep) 0%,var(--g-mid) 55%,var(--g-accent) 100%);
    background-attachment:fixed;
    color:var(--ink);
    min-height:100vh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:560px;margin:0 auto;padding:26px 18px 40px;}
  header{text-align:center;color:#fff;margin-bottom:22px;}
  .logo{
    width:84px;height:84px;border-radius:20px;object-fit:contain;
    background:rgba(255,255,255,.12);padding:10px;margin:0 auto 12px;display:block;
  }
  h1{font-size:26px;margin:0 0 4px;letter-spacing:.5px;font-weight:700;}
  .sub{font-size:14px;opacity:.85;margin:0;}
  .grid{display:flex;flex-direction:column;gap:14px;}
  .card{
    display:flex;align-items:center;gap:14px;
    background:var(--card);border-radius:16px;
    padding:18px 16px;text-decoration:none;color:var(--ink);
    box-shadow:0 4px 14px rgba(0,0,0,.18);
    border-left:6px solid var(--g-accent);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .card:active{transform:scale(.985);box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .ico{
    flex:0 0 50px;width:50px;height:50px;border-radius:12px;
    background:var(--g-pale);display:flex;align-items:center;justify-content:center;
    font-size:26px;line-height:1;
  }
  .body{flex:1;min-width:0;}
  .body .name{font-size:18px;font-weight:700;margin:0 0 2px;color:var(--g-deep);}
  .body .desc{font-size:13px;margin:0;color:#4a5a44;line-height:1.35;}
  .chev{flex:0 0 auto;color:var(--g-accent);font-size:22px;font-weight:700;}
  footer{text-align:center;color:#fff;opacity:.75;font-size:12px;margin-top:26px;}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <img src="logo.png" alt="NCEMS" class="logo" onerror="this.style.display='none'">
      <h1>NCEMS Apps</h1>
      <p class="sub">North Country EMS &middot; Field Tools</p>
    </header>

    <div class="grid" id="grid"></div>

    <footer>v1.1</footer>
  </div>

<script>
  /* =========================================================
     ADD AN APP: copy one block, fill in the four fields, done.
     icon = any emoji.  Order here = order on the page.
     ========================================================= */
  const APPS = [
    {
      name: "WAMBOchecker",
      desc: "Daily apparatus checks for the fleet",
      icon: "\uD83D\uDE9A",
      url:  "https://ncemsderek.github.io/WAMBOchecker/"
    },
    {
      name: "Intubation Guide",
      desc: "Field airway reference & drug math",
      icon: "\uD83E\uDEC1",
      url:  "https://ncemsderek.github.io/Intubation/"
    },
    {
      name: "On-Duty Incident Report",
      desc: "File and review shift incident reports",
      icon: "\uD83D\uDCDD",
      url:  "https://ncemsderek.github.io/onduty-incident-report/"
    },
    {
      name: "Clark County Protocols",
      desc: "2026 EMS patient care protocols",
      icon: "\uD83D\uDEE1\uFE0F",
      url:  "https://ncemsderek.github.io/Protocols/protocol-app.html"
    },
    {
      name: "NCEMS OT",
      desc: "Overtime sign-up & scheduling",
      icon: "\uD83D\uDD52",
      url:  "https://ncemsderek.github.io/ncems-ot/"
    }
  ];

  const esc = s => String(s).replace(/[&<>"]/g, c =>
    ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));

  document.getElementById("grid").innerHTML = APPS.map(a => `
    <a class="card" href="${esc(a.url)}">
      <div class="ico">${esc(a.icon)}</div>
      <div class="body">
        <p class="name">${esc(a.name)}</p>
        <p class="desc">${esc(a.desc)}</p>
      </div>
      <div class="chev">&rsaquo;</div>
    </a>`).join("");
</script>
</body>
</html>
